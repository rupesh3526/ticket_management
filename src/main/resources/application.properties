spring.application.name=ticket-management

# MySQL database connection properties
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
gemini.api.key=${GEMINI_API_KEY}

# JPA and Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logging.level.root=INFO
logging.level.com.rupesh.ticket_management.controller=DEBUG
logging.level.com.rupesh.ticket_management.security=DEBUG
logging.level.com.yourpackage.service.CustomUserDetailsService=DEBUG

# Gemini API key from environment variable
gemini.api.key=${GEMINI_API_KEY}

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true