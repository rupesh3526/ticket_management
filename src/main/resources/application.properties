spring.application.name=ticket-management

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

gemini.api.key=${GEMINI_API_KEY}

logging.level.root=INFO
logging.level.com.rupesh.ticket_management.controller=DEBUG
logging.level.com.rupesh.ticket_management.security=DEBUG
logging.level.com.yourpackage.service.CustomUserDetailsService=DEBUG

# Gemini API key from environment variable
gemini.api.key=${GEMINI_API_KEY}

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true